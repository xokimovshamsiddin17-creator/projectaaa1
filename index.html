<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anonim Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <meta name="description" content="Premium anonim chat xizmati">
</head>

<body>
  <div class="app-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <span class="title">Anonim Chat</span>
        <div id="userCount" class="user-count">Yuklanmoqda...</div>
      </div>
      <div class="topbar-right">
        <button id="themeBtn" class="theme-btn" title="Mavzu">🎨</button>
        <button id="clearCacheBtn" class="theme-btn" title="Tozalash">🗑️</button>
        <button id="clearAllBtn" class="theme-btn" title="Hamma uchun">🔄</button>
      </div>
    </header>

    <main class="wrapper">
      <div id="messages" class="display-area" aria-live="polite">
        <!-- Xabarlar shu yerga tushadi -->
      </div>

      <div id="replyPreview" class="reply-preview" style="display: none;">
        <span id="replyInfo">Javob berish...</span>
        <button id="cancelReply" class="cancel-reply">×</button>
      </div>

      <div class="bottom-bar">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Xabar..." rows="1"></textarea>
        </div>

        <div class="controls">
          <button id="sendBtn" class="send-btn" style="display: none;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
          </button>
          <button id="voiceBtn" class="voice-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
              <path
                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z">
              </path>
            </svg>
          </button>
        </div>

        <div id="recording-indicator" class="recording-indicator" style="display: none;">
          <span class="recording-dot"></span>
          <span id="recording-time">0:00</span>
          <button id="cancelRecordBtn"
            style="background:none;border:none;color:#fff;cursor:pointer;font-size:18px;margin-left:8px;">×</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/index.js"></script>
</body>

</html>
